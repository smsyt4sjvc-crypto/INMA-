<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://inmagent.com/service-agreement.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<link rel="apple-touch-icon" href="/icon-S.png">
<link rel="icon" type="image/png" href="/icon-S.png">
<link rel="manifest" href="/service-agreement-manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="INMA Agreement">
<meta name="theme-color" content="#1C1A17">
<title>INMA — Service Agreement Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#1C1A17;color:#F5F2ED;font-family:'Outfit',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;min-height:100dvh}
  .app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;max-width:780px;margin:0 auto}

  .topbar{position:sticky;top:0;z-index:10;padding:16px 20px 12px;background:linear-gradient(180deg,#1C1A17 80%,rgba(28,26,23,0));display:flex;justify-content:space-between;align-items:center;gap:16px}
  .brand-mark{font-weight:800;font-size:22px;color:#B8941F;letter-spacing:1px}
  .brand-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-top:-2px}

  .stage{flex:1;padding:8px 20px 120px}
  .card{background:#25221d;border:1px solid #3a352e;border-radius:20px;padding:22px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.25)}
  .card h2{margin:0 0 4px;font-size:22px;font-weight:700;color:#F5F2ED}
  .card .sub{font-size:13px;opacity:.55;margin:0 0 18px}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;opacity:.65;margin-bottom:6px;font-weight:500}
  .field input,.field select{width:100%;padding:14px;background:#1C1A17;border:1px solid #3a352e;border-radius:12px;color:#F5F2ED;font-family:inherit;font-size:16px;-webkit-appearance:none;transition:border-color .2s}
  .field input:focus{outline:none;border-color:#B8941F}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .fee-box{background:rgba(184,148,31,.08);border:1px solid rgba(184,148,31,.35);border-radius:14px;padding:18px 20px;margin-top:14px;display:flex;align-items:center;gap:14px}
  .fee-box .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#B8941F;font-weight:700}
  .fee-box .input-wrap{flex:1;display:flex;align-items:center;gap:6px;background:#1C1A17;border:1px solid #3a352e;border-radius:10px;padding:10px 14px}
  .fee-box .dollar{font-size:1.4rem;font-weight:800;color:#B8941F}
  .fee-box input{flex:1;border:none;outline:none;background:transparent;color:#F5F2ED;font-family:inherit;font-size:1.4rem;font-weight:700;width:100%;-webkit-appearance:none}

  .btn-primary{background:#B8941F;color:#1C1A17;border:none;padding:18px;border-radius:12px;font-weight:700;font-size:16px;font-family:inherit;cursor:pointer;letter-spacing:.5px;width:100%}
  .btn-primary:hover{background:#d4a828}

  .btn-contact{display:block;width:100%;background:#1C1A17;border:1px solid #3a352e;color:#F5F2ED;padding:14px;border-radius:999px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:18px;letter-spacing:.3px;transition:background .15s,border-color .15s}
  .btn-contact:hover,.btn-contact:active{background:#2a2620;border-color:#B8941F}
  .btn-contact .ico{margin-right:8px}

  @media(max-width:560px){
    .row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">INMA</div>
      <div class="brand-sub">Service Agreement</div>
    </div>
  </header>

  <main class="stage">
    <div class="card">
      <h2>Homeowner Info</h2>
      <p class="sub">Type in the details — the agreement fills itself in. Sign on the printed copy.</p>

      <button id="contactBtn" type="button" class="btn-contact"><span class="ico">📇</span>Import from Contacts</button>

      <div class="row">
        <div class="field"><label>Agreement Date</label><input id="agreementDate" type="text" readonly></div>
        <div class="field"><label>Project Type</label><input id="projectType" type="text" placeholder="Siding · Windows · Doors" autocomplete="off"></div>
      </div>

      <div class="field"><label>Homeowner(s)</label><input id="ownerName" type="text" placeholder="Full name(s)" autocomplete="name"></div>

      <div class="field"><label>Project Address</label><input id="propertyAddress" type="text" placeholder="Street address" autocomplete="street-address"></div>

      <div class="row">
        <div class="field"><label>City / State / ZIP</label><input id="cityStateZip" type="text" placeholder="Spokane, WA 99201" autocomplete="address-level2"></div>
        <div class="field"><label>Phone</label><input id="ownerPhone" type="tel" placeholder="(509) 000-0000" autocomplete="tel"></div>
      </div>

      <div class="field"><label>Homeowner Email</label><input id="ownerEmail" type="email" placeholder="email@example.com" autocomplete="email"></div>
    </div>

    <div class="card">
      <h2>INMA Service Fee</h2>
      <p class="sub">Paid at signing. Comes out of the contract — not added on top.</p>
      <div class="fee-box">
        <div class="lbl">FEE</div>
        <div class="input-wrap">
          <span class="dollar">$</span>
          <input id="inmaFee" type="text" placeholder="0.00" inputmode="decimal">
        </div>
      </div>
    </div>

    <div class="card" style="text-align:center;background:transparent;border:0;box-shadow:none;padding:0">
      <button class="btn-primary" id="generateBtn" type="button">📄 Generate &amp; Print / Share / Save PDF</button>
    </div>
  </main>
</div>

function $(s){ return document.querySelector(s); }
function fmtFee(raw){
  const n = parseFloat(String(raw).replace(/[^0-9.]/g,''));
  if (!isFinite(n) || n <= 0) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function escapeHTML(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function pickContact(){
  if ('contacts' in navigator && 'ContactsManager' in window){
    try {
      const wanted = ['name','tel','email','address'];
      const supported = await navigator.contacts.getProperties();
      const props = wanted.filter(p => supported.includes(p));
      const result = await navigator.contacts.select(props, { multiple:false });
      if (!result || !result.length) return;
      const c = result[0];
      if (c.name && c.name[0]) $('#ownerName').value = c.name[0];
      if (c.tel && c.tel[0])  $('#ownerPhone').value = c.tel[0];
      if (c.email && c.email[0]) $('#ownerEmail').value = c.email[0];
      if (c.address && c.address[0]){
        const a = c.address[0];
        const street = (a.addressLine && a.addressLine.join(' ')) || '';
        if (street) $('#propertyAddress').value = street;
        const csz = [a.city, a.region, a.postalCode].filter(Boolean).join(', ').replace(/,\s*(\d{5})/, ' $1');
        if (csz) $('#cityStateZip').value = csz;
      }
      return;
    } catch(e){ /* user cancelled or denied — fall through */ return; }
  }
  // iOS Safari has no Contacts API. Focus the name field so the QuickType bar shows contact suggestions.
  const nameField = $('#ownerName');
  nameField.focus();
  alert('iOS Safari does not allow web pages to open Contacts directly.\n\nTap the Homeowner field, then tap the "Contact" suggestion above the keyboard to pull from your iPhone contacts.');
}

document.addEventListener('DOMContentLoaded', () => {
  $('#agreementDate').value = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  $('#generateBtn').addEventListener('click', generate);
  $('#contactBtn').addEventListener('click', pickContact);
});

function getData(){
  return {
    date: $('#agreementDate').value,
    project: $('#projectType').value.trim() || '—',
    name: $('#ownerName').value.trim() || '—',
    address: $('#propertyAddress').value.trim() || '—',
    cityStateZip: $('#cityStateZip').value.trim() || '—',
    phone: $('#ownerPhone').value.trim() || '—',
    email: $('#ownerEmail').value.trim() || '—',
    fee: fmtFee($('#inmaFee').value),
  };
}

function generate(){
  const d = getData();
  if (d.name === '—'){ alert('Please enter the homeowner name.'); return; }
